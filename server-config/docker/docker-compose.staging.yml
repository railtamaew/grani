# Диагностика (staging / локально): медленные SQL в stderr контейнера postgres.
# Не подмешивать в прод без оценки объёма логов и диска.
#
# Запуск:
#   mkdir -p ../../logs/docker-nginx
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# Просмотр slow queries:
#   docker logs granivpn_postgres 2>&1 | grep -i duration

services:
  postgres:
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      # Пример: логировать только запросы дольше 500 ms (-1 = выкл.)
      - -c
      - log_min_duration_statement=500
      - -c
      - log_lock_waits=on
      - -c
      - "log_line_prefix=%m [%p] user=%u db=%d app=%a client=%h "
