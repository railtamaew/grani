name: Desktop Build (Windows + macOS)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build official AmneziaWG Windows runtime
        shell: pwsh
        run: |
          $awgSource = Join-Path $env:RUNNER_TEMP 'amneziawg-windows-client'
          git clone --depth 1 https://github.com/amnezia-vpn/amneziawg-windows-client.git $awgSource
          Push-Location $awgSource
          cmd /c build.bat
          Pop-Location

          New-Item -ItemType Directory -Force -Path 'bin/amneziawg/windows'
          Copy-Item (Join-Path $awgSource 'amd64/amneziawg.exe') 'bin/amneziawg/windows/amneziawg.exe' -Force
          Copy-Item (Join-Path $awgSource 'amd64/awg.exe') 'bin/amneziawg/windows/awg.exe' -Force
          Copy-Item (Join-Path $awgSource 'amd64/wintun.dll') 'bin/amneziawg/windows/wintun.dll' -Force
          Get-Item 'bin/amneziawg/windows/amneziawg.exe'
          Get-Item 'bin/amneziawg/windows/awg.exe'
          Get-Item 'bin/amneziawg/windows/wintun.dll'

      - name: Build Windows
        run: flutter build windows --release

      - name: Download official Hysteria2 Windows runtime
        shell: pwsh
        run: |
          $runtimeDir = 'bin/hysteria2/windows'
          $runtimePath = Join-Path $runtimeDir 'hysteria.exe'
          $downloadUrl = 'https://github.com/apernet/hysteria/releases/download/app/v2.10.0/hysteria-windows-amd64.exe'
          $expectedSha256 = 'a0b4b1851919235b9424632b894b5232eec861c1c20e955e82e3dbc6698490d0'

          New-Item -ItemType Directory -Force -Path $runtimeDir
          Invoke-WebRequest -Uri $downloadUrl -OutFile $runtimePath
          $actualSha256 = (Get-FileHash -Algorithm SHA256 $runtimePath).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "Hysteria2 SHA256 mismatch: expected $expectedSha256, got $actualSha256"
          }
          Get-Item $runtimePath

      - name: Download official sing-box Windows runtime
        shell: pwsh
        run: |
          $version = '1.13.14'
          $runtimeDir = 'bin/sing-box/windows'
          $archivePath = Join-Path $env:RUNNER_TEMP "sing-box-$version-windows-amd64.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "sing-box-$version-windows-amd64"
          $downloadUrl = "https://github.com/SagerNet/sing-box/releases/download/v$version/sing-box-$version-windows-amd64.zip"
          $expectedSha256 = 'f580782c6dd10f7691c66cea1d7c421813c5fbf7e305d1ee7ce0c3a40d196341'

          New-Item -ItemType Directory -Force -Path $runtimeDir
          Invoke-WebRequest -Uri $downloadUrl -OutFile $archivePath
          $actualSha256 = (Get-FileHash -Algorithm SHA256 $archivePath).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "sing-box SHA256 mismatch: expected $expectedSha256, got $actualSha256"
          }
          Expand-Archive -Path $archivePath -DestinationPath $extractDir -Force
          $source = Get-ChildItem -Path $extractDir -Recurse -Filter 'sing-box.exe' | Select-Object -First 1
          if ($null -eq $source) {
            throw 'sing-box.exe is missing from the official archive'
          }
          Copy-Item $source.FullName (Join-Path $runtimeDir 'sing-box.exe') -Force
          & (Join-Path $runtimeDir 'sing-box.exe') version

      - name: Package Windows VPN runtimes
        shell: pwsh
        run: |
          $releaseDir = 'build/windows/x64/runner/Release'
          $runtimeDir = 'bin/amneziawg/windows'

          if (!(Test-Path (Join-Path $releaseDir 'mobile_app.exe'))) {
            throw "Missing Windows release executable in $releaseDir"
          }

          foreach ($runtimeFile in @('amneziawg.exe', 'awg.exe', 'wintun.dll')) {
            $source = Join-Path $runtimeDir $runtimeFile
            if (!(Test-Path $source)) {
              throw "Missing built AmneziaWG runtime file at $source"
            }
            Copy-Item $source (Join-Path $releaseDir $runtimeFile) -Force
          }
          $hysteriaSource = 'bin/hysteria2/windows/hysteria.exe'
          if (!(Test-Path $hysteriaSource)) {
            throw "Missing official Hysteria2 runtime at $hysteriaSource"
          }
          Copy-Item $hysteriaSource (Join-Path $releaseDir 'hysteria.exe') -Force
          $singBoxSource = 'bin/sing-box/windows/sing-box.exe'
          if (!(Test-Path $singBoxSource)) {
            throw "Missing official sing-box runtime at $singBoxSource"
          }
          Copy-Item $singBoxSource (Join-Path $releaseDir 'sing-box.exe') -Force
          Get-Item (Join-Path $releaseDir 'mobile_app.exe')
          Get-Item (Join-Path $releaseDir 'amneziawg.exe')
          Get-Item (Join-Path $releaseDir 'awg.exe')
          Get-Item (Join-Path $releaseDir 'wintun.dll')
          Get-Item (Join-Path $releaseDir 'hysteria.exe')
          Get-Item (Join-Path $releaseDir 'sing-box.exe')

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: mobile-app/build/windows/x64/runner/Release/

  macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          cache: true

      - name: Setup Go for WireGuardKitGo
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.x

      - name: Install dependencies
        run: flutter pub get

      - name: Install macOS pods
        working-directory: mobile-app/macos
        run: |
          set -o pipefail
          pod install --repo-update --verbose 2>&1 | tee pod-install.log || {
            echo "::group::CocoaPods failure summary"
            grep -n -E "^\[!\]|could not find compatible|Specs satisfying|required a higher minimum deployment|Unable to find|None of your spec sources|conflict|Firebase|Google|macOS|OS X" -A 50 -B 25 pod-install.log || true
            echo "::endgroup::"
            echo "::group::CocoaPods tail"
            tail -n 300 pod-install.log
            echo "::endgroup::"
            exit 1
          }

      - name: Prepare AmneziaWG Apple bridge
        working-directory: mobile-app
        run: |
          set -euxo pipefail
          go version
          flutter build macos --config-only
          xcodebuild -resolvePackageDependencies \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -derivedDataPath build/macos
          bridge_dir="$PWD/build/macos/SourcePackages/checkouts/amneziawg-apple/Sources/WireGuardKitGo"
          if [ ! -d "$bridge_dir" ]; then
            echo "amneziawg-apple WireGuardKitGo checkout was not found"
            find "$PWD/build/macos/SourcePackages/checkouts" -path '*/Sources/WireGuardKitGo' -type d -print || true
            exit 1
          fi
          bridge_temp="$RUNNER_TEMP/wireguardkitgo-temp"
          rm -rf "$bridge_temp"
          mkdir -p "$bridge_temp" "$bridge_dir/out"
          real_goroot="$(go env GOROOT)"
          prepared_goroot="$bridge_temp/wireguard-go-bridge/goroot"
          mkdir -p "$prepared_goroot"
          rsync -a --delete --exclude=pkg/obj/go-build "$real_goroot/" "$prepared_goroot/"
          PREPARED_GOROOT="$prepared_goroot" python3 - <<WGOPREP
          from pathlib import Path
          import os
          root = Path(os.environ["PREPARED_GOROOT"])
          replacements = [
              ("src/runtime/sys_darwin.go", "libc_mach_absolute_time", "libc_mach_continuous_time"),
              ("src/runtime/sys_darwin_amd64.s", "CALL\tlibc_mach_absolute_time(SB)", "CALL\tlibc_mach_continuous_time(SB)"),
              ("src/runtime/sys_darwin_arm64.s", "BL\tlibc_mach_absolute_time(SB)", "BL\tlibc_mach_continuous_time(SB)"),
          ]
          for rel, old_value, new_value in replacements:
              runtime_path = root / rel
              value = runtime_path.read_text()
              if new_value not in value:
                  if old_value not in value:
                      raise SystemExit(f"{old_value} not found in {runtime_path}")
                  value = value.replace(old_value, new_value, 1)
                  runtime_path.write_text(value)
          (root / ".prepared").touch()
          WGOPREP
          make -C "$bridge_dir" PLATFORM_NAME=macosx CONFIGURATION_TEMP_DIR="$bridge_temp" CONFIGURATION_BUILD_DIR="$bridge_dir/out"
          test -f "$bridge_dir/out/libwg-go.a"
          ls -lh "$bridge_dir/out/libwg-go.a"

      - name: Build macOS
        run: flutter build macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: mobile-app/build/macos/Build/Products/Release/
