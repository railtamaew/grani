name: Desktop Build (Windows + macOS)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build AmneziaWG Windows tunnel.dll
        shell: pwsh
        run: |
          $awgSource = Join-Path $env:RUNNER_TEMP 'amneziawg-windows'
          git clone --depth 1 https://github.com/amnezia-vpn/amneziawg-windows.git $awgSource
          Push-Location $awgSource
          cmd /c build.cmd
          Pop-Location

          New-Item -ItemType Directory -Force -Path 'bin/amneziawg/windows'
          Copy-Item (Join-Path $awgSource 'x64/tunnel.dll') 'bin/amneziawg/windows/tunnel.dll' -Force
          Get-Item 'bin/amneziawg/windows/tunnel.dll'

      - name: Build Windows
        run: flutter build windows --release

      - name: Package AmneziaWG Windows runtime
        shell: pwsh
        run: |
          $releaseDir = 'build/windows/x64/runner/Release'
          $tunnelDll = 'bin/amneziawg/windows/tunnel.dll'
          $releaseTunnelDll = Join-Path $releaseDir 'tunnel.dll'

          if (!(Test-Path $tunnelDll)) {
            throw "Missing built AmneziaWG tunnel.dll at $tunnelDll"
          }
          if (!(Test-Path (Join-Path $releaseDir 'mobile_app.exe'))) {
            throw "Missing Windows release executable in $releaseDir"
          }

          Copy-Item $tunnelDll $releaseTunnelDll -Force
          Get-Item (Join-Path $releaseDir 'mobile_app.exe')
          Get-Item $releaseTunnelDll

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: mobile-app/build/windows/x64/runner/Release/

  macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install macOS pods
        working-directory: mobile-app/macos
        run: |
          set -o pipefail
          pod install --repo-update --verbose 2>&1 | tee pod-install.log || {
            echo "::group::CocoaPods failure summary"
            grep -n -E "^\[!\]|could not find compatible|Specs satisfying|required a higher minimum deployment|Unable to find|None of your spec sources|conflict|Firebase|Google|macOS|OS X" -A 50 -B 25 pod-install.log || true
            echo "::endgroup::"
            echo "::group::CocoaPods tail"
            tail -n 300 pod-install.log
            echo "::endgroup::"
            exit 1
          }

      - name: Build macOS
        run: flutter build macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: mobile-app/build/macos/Build/Products/Release/
