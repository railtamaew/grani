name: Desktop Build (Windows + macOS)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build AmneziaWG Windows tunnel.dll
        shell: pwsh
        run: |
          $awgSource = Join-Path $env:RUNNER_TEMP 'amneziawg-windows'
          git clone --depth 1 https://github.com/amnezia-vpn/amneziawg-windows.git $awgSource
          Push-Location $awgSource
          cmd /c build.cmd
          Pop-Location

          New-Item -ItemType Directory -Force -Path 'bin/amneziawg/windows'
          Copy-Item (Join-Path $awgSource 'x64/tunnel.dll') 'bin/amneziawg/windows/tunnel.dll' -Force
          Get-Item 'bin/amneziawg/windows/tunnel.dll'

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: mobile-app/build/windows/x64/runner/Release/

  macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: mobile-app/build/macos/Build/Products/Release/
